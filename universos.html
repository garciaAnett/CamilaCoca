<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAMIRA — Universos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="universos.css">
</head>
<body>

  <!-- ═══ NAV ═══ -->
  <nav class="uv-nav" id="nav">
    <div class="uv-nav__inner">
      <a href="index.html" class="uv-nav__back" aria-label="Volver">‹</a>
      <a href="index.html" class="uv-nav__logo">CAMIRA</a>
      <span class="uv-nav__tagline">VISUAL STORYTELLER</span>
    </div>
  </nav>

  <!-- ═══ LAYOUT: SIDEBAR + MAIN ═══ -->
  <div class="uv-layout">

    <!-- ── SIDEBAR ── -->
    <aside class="uv-sidebar">
      <p class="uv-sidebar__label">UNIVERSOS</p>

      <div class="uv-sidebar__list">
        <div class="uv-sidebar__item uv-sidebar__item--active" data-key="editorial">
          <div class="uv-sidebar__thumb">
            <img src="imagenes/editorial_Isis_camacho/editorial_isis_camacho4.jpg" alt="Editorial">
          </div>
          <div class="uv-sidebar__info">
            <p class="uv-sidebar__name">EDITORIAL</p>
            <p class="uv-sidebar__sub">FOTOGRAFÍA</p>
          </div>
        </div>

        <div class="uv-sidebar__item" data-key="publicitaria">
          <div class="uv-sidebar__thumb">
            <img src="imagenes/publicitaria_final/final.jpg" alt="Publicitaria">
          </div>
          <div class="uv-sidebar__info">
            <p class="uv-sidebar__name">PUBLICITARIA</p>
            <p class="uv-sidebar__sub">FOTOGRAFÍA</p>
          </div>
        </div>

        <div class="uv-sidebar__item" data-key="documental">
          <div class="uv-sidebar__thumb">
            <img src="imagenes/documental/docuemntal.JPG" alt="Documental">
          </div>
          <div class="uv-sidebar__info">
            <p class="uv-sidebar__name">DOCUMENTAL</p>
            <p class="uv-sidebar__sub">FOTOGRAFÍA</p>
          </div>
        </div>
      </div>

      <a href="fotografia.html" class="uv-sidebar__footer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <span>GALERÍA COMPLETA</span>
      </a>
    </aside>

    <!-- ── MAIN CONTENT ── -->
    <main class="uv-main" id="uvMain">

      <!-- HERO -->
      <section class="uv-hero">
        <img class="uv-hero__bg" id="uvHeroBg" src="" alt="">
        <div class="uv-hero__overlay"></div>

        <div class="uv-hero__content">
          <p class="uv-hero__breadcrumb" id="uvBreadcrumb"></p>
          <h1 class="uv-hero__title" id="uvTitle"></h1>
          <div class="uv-hero__diamond">✦</div>
          <p class="uv-hero__desc" id="uvDesc"></p>
          <p class="uv-hero__quote" id="uvQuote"></p>
          <a href="fotografia.html" class="uv-hero__btn">
            VER GALERÍA
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
        </div>

        <!-- STATUS PANEL -->
        <div class="uv-status">
          <p class="uv-status__title">ESTADO DEL PROYECTO</p>
          <div class="uv-status__list" id="uvStatusList"></div>
        </div>
      </section>

      <!-- SUB-GRID -->
      <div class="uv-sub-grid" id="uvSubGrid"></div>

      <!-- BOTTOM ROW -->
      <div class="uv-bottom-row">
        <div class="uv-personas">
          <span class="uv-sub__num" id="uvPersonasLabel">05. COLABORADORES</span>
          <div class="uv-personas__grid" id="uvPersonasGrid"></div>
        </div>
        <div class="uv-board">
          <span class="uv-sub__num">06. VISUAL BOARD</span>
          <div class="uv-board__grid" id="uvBoardGrid"></div>
          <a href="fotografia.html" class="uv-sub__link">VER MÁS →</a>
        </div>
      </div>

    </main>
  </div>

  <!-- ═══ FOOTER ═══ -->
  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__logo">CAMIRA</span>
      <nav class="footer__links" aria-label="Redes sociales">
        <a href="https://www.instagram.com/camiradesign?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noopener">INSTAGRAM</a>
        <a href="https://www.tiktok.com/@camiradesign">TIKTOK</a>
        <a href="mailto:camira.design@gmail.com">EMAIL</a>
      </nav>
      <span class="footer__copy">© 2026 CAMIRA · TODOS LOS DERECHOS RESERVADOS</span>
    </div>
  </footer>

  <script src="universos.js"></script>

</html>
