<html lang="es">
<head>
  <meta charset="UTF-8">

  <title>CAMIRA — Fotografía</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

  <!-- ═══ NAV ═══ -->
  <nav class="nav nav--gallery" id="nav">

      <a href="index.html" class="gal-back" aria-label="Volver">‹</a>
      <a href="index.html" class="nav__logo">CAMIRA</a>

  <!-- ═══ HEADER ═══ -->
  <header class="gal-header">
    <div class="container">
      <p class="gal-header__num">01</p>
      <h1 class="gal-header__title">FOTOGRAFÍA</h1>
      <div class="sec-dash"></div>
      <p class="gal-header__desc">Serie de fotografías conceptuales que exploran la luz, la emoción y la narrativa visual.</p>
    </div>
  </header>

  <!-- ═══ CATEGORÍAS ═══ -->
  <section class="gal-grid-section">
    <div class="container">

      <div class="gal-tabs" id="galTabs">
        <button class="gal-tab active" data-cat="editorial">EDITORIAL</button>
        <button class="gal-tab" data-cat="publicitaria">PUBLICITARIA</button>
        <button class="gal-tab" data-cat="documental">DOCUMENTAL</button>
      </div>

      <div class="gal-masonry" id="galMasonry">

        <!-- ── EDITORIAL · Lu ── -->
        <div class="gal-item" data-cat="editorial"
             data-title="Retrato en luz natural"
             data-lugar="Cochabamba, Bolivia"
             data-desc="Retrato conceptual capturado durante la hora dorada, aprovechando la luz natural que entraba por la ventana del estudio."
             data-experiencia="Una sesión íntima donde la modelo transmitió vulnerabilidad y fuerza al mismo tiempo. La luz cálida del atardecer creó sombras suaves que acentuaron cada expresión."
             data-fotos="imagenes/editorial_lu/fotoLu1.jpg,imagenes/editorial_lu/fotoLu2.jpg,imagenes/editorial_lu/foto Lu.JPG">
          <img src="imagenes/editorial_lu/foto Lu.JPG" alt="Retrato en luz natural">
        </div>

        <div class="gal-item" data-cat="editorial"
             data-title="Sesión Lu · Toma II"
             data-lugar="Cochabamba, Bolivia"
             data-desc="Segunda toma de la sesión editorial, explorando ángulos y composiciones distintas."
             data-experiencia="Cambiar la perspectiva reveló una faceta completamente diferente de la modelo. La misma luz, otro encuadre, otra historia."
             data-fotos="imagenes/editorial_lu/foto Lu.JPG,imagenes/editorial_lu/fotoLu2.jpg">
          <img src="imagenes/editorial_lu/fotoLu1.jpg" alt="Sesión Lu · Toma II">
        </div>

        <div class="gal-item" data-cat="editorial"
             data-title="Sesión Lu · Toma III"
             data-lugar="Cochabamba, Bolivia"
             data-desc="Cierre de la sesión editorial con una composición más íntima y cercana."
             data-experiencia="Los últimos minutos de la sesión suelen regalar las mejores fotos, cuando la modelo se relaja y la cámara desaparece."
             data-fotos="imagenes/editorial_lu/foto Lu.JPG,imagenes/editorial_lu/fotoLu1.jpg">
          <img src="imagenes/editorial_lu/fotoLu2.jpg" alt="Sesión Lu · Toma III">
        </div>

        <!-- ── EDITORIAL · Camila Ponce ── -->
        <div class="gal-item" data-cat="editorial"
             data-title="Editorial Camila Ponce"
             data-lugar="Cochabamba, Bolivia"
             data-desc="Sesión editorial con Camila Ponce, combinando moda, expresión y narrativa visual."
             data-experiencia="Trabajar con Camila fue un ejercicio de confianza mutua. Cada pose fue una conversación entre la luz, el vestuario y su personalidad."
             data-fotos="imagenes/editorial_camila_ponce/editorial_Camila_Ponce1.jpg,imagenes/editorial_camila_ponce/editorial_Camila_Ponce2.jpg,imagenes/editorial_camila_ponce/editorial_Camila_Ponce3.jpg">
          <img src="imagenes/editorial_camila_ponce/editorial_Camila_Ponce.jpg" alt="Editorial Camila Ponce">
        </div>

        <div class="gal-item" data-cat="editorial"
             data-title="Camila Ponce · Toma II"
             data-lugar="Cochabamba, Bolivia"
             data-desc="Segunda composición de la sesión editorial, jugando con nuevos encuadres."
             data-experiencia="Exploramos diferentes fondos y texturas para crear contraste con el vestuario."
             data-fotos="imagenes/editorial_camila_ponce/editorial_Camila_Ponce.jpg,imagenes/editorial_camila_ponce/editorial_Camila_Ponce2.jpg,imagenes/editorial_camila_ponce/editorial_Camila_Ponce3.jpg">
          <img src="imagenes/editorial_camila_ponce/editorial_Camila_Ponce1.jpg" alt="Camila Ponce · Toma II">
        </div>

        <div class="gal-item" data-cat="editorial"
             data-title="Camila Ponce · Toma III"
             data-lugar="Cochabamba, Bolivia"
             data-desc="Tercer momento de la sesión, capturando movimiento y fluidez."
             data-experiencia="Le pedimos que se moviera libremente mientras disparábamos. Las mejores tomas nacieron de lo espontáneo."
             data-fotos="imagenes/editorial_camila_ponce/editorial_Camila_Ponce.jpg,imagenes/editorial_camila_ponce/editorial_Camila_Ponce1.jpg,imagenes/editorial_camila_ponce/editorial_Camila_Ponce3.jpg">
          <img src="imagenes/editorial_camila_ponce/editorial_Camila_Ponce2.jpg" alt="Camila Ponce · Toma III">
        </div>

        <div class="gal-item" data-cat="editorial"
             data-title="Camila Ponce · Toma IV"
             data-lugar="Cochabamba, Bolivia"
             data-desc="Cierre de la sesión editorial con una imagen más contemplativa."
             data-experiencia="El final de la sesión trajo una energía diferente, más calmada, que se refleja en esta última toma."
             data-fotos="imagenes/editorial_camila_ponce/editorial_Camila_Ponce.jpg,imagenes/editorial_camila_ponce/editorial_Camila_Ponce1.jpg,imagenes/editorial_camila_ponce/editorial_Camila_Ponce2.jpg">
          <img src="imagenes/editorial_camila_ponce/editorial_Camila_Ponce3.jpg" alt="Camila Ponce · Toma IV">
        </div>

        <!-- ── EDITORIAL · Fashion ── -->
        <div class="gal-item" data-cat="editorial"
             data-title="Editorial Fashion"
             data-lugar="Bolivia"
             data-desc="Editorial de moda que fusiona tendencias con identidad local, creando imágenes con carácter propio."
             data-experiencia="Cada detalle fue pensado: el styling, la locación, la luz. La moda como lenguaje visual para contar historias."
             data-fotos="imagenes/editorial_fashion/Ediorial_Fashion1.jpg,imagenes/editorial_fashion/Ediorial_Fashion2.jpg,imagenes/editorial_fashion/Ediorial_Fashion3.jpg,imagenes/editorial_fashion/Editorial_Fashion1.png">
          <img src="imagenes/editorial_fashion/Ediorial_Fashion.jpg" alt="Editorial Fashion">
        </div>

        <div class="gal-item" data-cat="editorial"
             data-title="Fashion · Toma II"
             data-lugar="Bolivia"
             data-desc="Segunda imagen del editorial de moda, explorando siluetas y texturas."
             data-experiencia="Jugamos con capas de ropa y accesorios para construir una imagen que hablara de identidad y estilo."
             data-fotos="imagenes/editorial_fashion/Ediorial_Fashion.jpg,imagenes/editorial_fashion/Ediorial_Fashion2.jpg,imagenes/editorial_fashion/Ediorial_Fashion3.jpg,imagenes/editorial_fashion/Editorial_Fashion1.png">
          <img src="imagenes/editorial_fashion/Ediorial_Fashion1.jpg" alt="Fashion · Toma II">
        </div>

        <div class="gal-item" data-cat="editorial"
             data-title="Fashion · Toma III"
             data-lugar="Bolivia"
             data-desc="Composición que destaca la relación entre el cuerpo, la prenda y el espacio."
             data-experiencia="La arquitectura del lugar se convirtió en parte del vestuario. No queríamos separar la moda del entorno."
             data-fotos="imagenes/editorial_fashion/Ediorial_Fashion.jpg,imagenes/editorial_fashion/Ediorial_Fashion1.jpg,imagenes/editorial_fashion/Ediorial_Fashion3.jpg,imagenes/editorial_fashion/Editorial_Fashion1.png">
          <img src="imagenes/editorial_fashion/Ediorial_Fashion2.jpg" alt="Fashion · Toma III">
        </div>

        <div class="gal-item" data-cat="editorial"

             data-lugar="Bolivia"
             data-desc="Cierre del editorial con una imagen que resume la esencia de toda la serie."
             data-experiencia="Esta fue la última foto del día. La modelo, ya relajada, nos regaló la expresión más auténtica de toda la sesión."

          <img src="imagenes/editorial_fashion/Ediorial_Fashion3.jpg" alt="Fashion · Toma IV">
        </div>

        <div class="gal-item" data-cat="editorial"
             data-title="Fashion · Detalle"
             data-lugar="Bolivia"
             data-desc="Detalle del editorial que captura texturas y acabados del vestuario."
             data-experiencia="A veces una imagen de detalle comunica más que un plano general. El macro reveló la calidad de cada pieza."
             data-fotos="imagenes/editorial_fashion/Ediorial_Fashion.jpg,imagenes/editorial_fashion/Ediorial_Fashion1.jpg,imagenes/editorial_fashion/Ediorial_Fashion2.jpg,imagenes/editorial_fashion/Ediorial_Fashion3.jpg">
          <img src="imagenes/editorial_fashion/Editorial_Fashion1.png" alt="Fashion · Detalle">
        </div>

        <!-- ── PUBLICITARIA ── -->
        <div class="gal-item" data-cat="publicitaria"
             data-title="Producto en escena"
             data-lugar="Cochabamba, Bolivia"
             data-desc="Fotografía publicitaria que presenta el producto dentro de un contexto visual atractivo y memorable."
             data-experiencia="El reto fue crear un set que realzara el producto sin robarle protagonismo. Cada elemento de utilería fue elegido para complementar la paleta de colores y la narrativa de la marca."
             data-fotos="imagenes/publicitaria_final/final1.png,imagenes/publicitaria_final/final2.png,imagenes/publicitaria_choco/choco.png">
          <img src="imagenes/publicitaria_final/final.jpg" alt="Producto en escena">
        </div>

        <div class="gal-item" data-cat="publicitaria"
             data-title="Producto · Toma II"
             data-lugar="Cochabamba, Bolivia"
             data-desc="Segunda composición del producto, variando la disposición de los elementos."
             data-experiencia="Mover un solo objeto cambió completamente la narrativa. Cada detalle en fotografía publicitaria importa."
             data-fotos="imagenes/publicitaria_final/final.jpg,imagenes/publicitaria_final/final2.png,imagenes/publicitaria_choco/choco.png">
          <img src="imagenes/publicitaria_final/final1.png" alt="Producto · Toma II">
        </div>

        <div class="gal-item" data-cat="publicitaria"
             data-title="Producto · Toma III"
             data-lugar="Cochabamba, Bolivia"
             data-desc="Tercera variación de la sesión publicitaria, enfocada en el detalle y la textura."
             data-experiencia="Acercar la cámara al producto reveló texturas que a simple vista pasaban desapercibidas."
             data-fotos="imagenes/publicitaria_final/final.jpg,imagenes/publicitaria_final/final1.png,imagenes/publicitaria_choco/choco.png">
          <img src="imagenes/publicitaria_final/final2.png" alt="Producto · Toma III">
        </div>

        <div class="gal-item" data-cat="publicitaria"
             data-title="Composición de marca"
             data-lugar="Cochabamba, Bolivia"
             data-desc="Imagen publicitaria que combina textura, color y producto para comunicar la esencia de una marca."
             data-experiencia="Trabajamos con chocolate artesanal y la idea fue transmitir calidez y autenticidad. La iluminación lateral creó sombras que aportaron profundidad y elegancia a la composición."
             data-fotos="imagenes/publicitaria_choco/choco1.png,imagenes/publicitaria_choco/choco2.jpg,imagenes/publicitaria_final/final.jpg">
          <img src="imagenes/publicitaria_choco/choco.png" alt="Composición de marca">
        </div>

        <div class="gal-item" data-cat="publicitaria"
             data-title="Chocolate · Toma II"
             data-lugar="Cochabamba, Bolivia"
             data-desc="Segunda toma de la sesión de chocolate artesanal, variando la iluminación."
             data-experiencia="Cambiamos la dirección de la luz para crear un ambiente más cálido y envolvente."
             data-fotos="imagenes/publicitaria_choco/choco.png,imagenes/publicitaria_choco/choco2.jpg,imagenes/publicitaria_final/final.jpg">
          <img src="imagenes/publicitaria_choco/choco1.png" alt="Chocolate · Toma II">
        </div>

        <div class="gal-item" data-cat="publicitaria"
             data-title="Chocolate · Toma III"
             data-lugar="Cochabamba, Bolivia"
             data-desc="Tercera composición de la serie de chocolate, con un enfoque más cercano al detalle."
             data-experiencia="El brillo del chocolate derretido bajo la luz fue hipnótico. Capturarlo en su punto exacto requirió paciencia y timing."
             data-fotos="imagenes/publicitaria_choco/choco.png,imagenes/publicitaria_choco/choco1.png,imagenes/publicitaria_final/final.jpg">
          <img src="imagenes/publicitaria_choco/choco2.jpg" alt="Chocolate · Toma III">
        </div>

        <!-- ── DOCUMENTAL ── -->
        <div class="gal-item" data-cat="documental"
             data-title="Momento capturado"
             data-lugar="Bolivia"
             data-desc="Fotografía documental que captura un instante real, sin intervención ni puesta en escena."
             data-experiencia="La fotografía documental exige paciencia y respeto por el momento. Esta imagen nació de observar sin interrumpir, dejando que la escena hablara por sí misma."
             data-fotos="imagenes/editorial_lu/foto Lu.JPG,imagenes/sitio/foto2.png,imagenes/sitio/fotoPrincipal.jpeg">
          <img src="imagenes/documental/docuemntal.JPG" alt="Momento capturado">
        </div>

      </div>
    </div>
