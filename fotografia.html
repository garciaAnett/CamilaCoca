<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAMIRA — Fotografía</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="galeria.css">
</head>
<body>

  <!-- ═══ NAV ═══ -->
  <nav class="nav nav--gallery" id="nav">
    <div class="nav__inner">
      <a href="index.html" class="gal-back" aria-label="Volver">‹</a>
      <a href="index.html" class="nav__logo">CAMIRA</a>
    </div>
  </nav>

  <!-- ═══ HEADER ═══ -->
  <header class="gal-header">
    <div class="container">
      <p class="gal-header__num">01</p>
      <h1 class="gal-header__title">FOTOGRAFÍA</h1>
      <div class="sec-dash"></div>
      <p class="gal-header__desc">Serie de fotografías conceptuales que exploran la luz, la emoción y la narrativa visual.</p>
    </div>
  </header>

  <!-- ═══ CATEGORÍAS ═══ -->
  <section class="gal-grid-section">
    <div class="container">

      <div class="gal-tabs" id="galTabs">
        <button class="gal-tab active" data-cat="editorial">EDITORIAL</button>
        <button class="gal-tab" data-cat="publicitaria">PUBLICITARIA</button>
        <button class="gal-tab" data-cat="documental">DOCUMENTAL</button>
      </div>

      <div class="gal-masonry" id="galMasonry">

        <!-- ── EDITORIAL · Maquillaje Profesional ── -->
        <div class="gal-item" data-cat="editorial"
             data-title="Maquillaje Profesional"
             data-lugar="Cochabamba, Bolivia"
             data-desc="Proyecto universitario de fotografía publicitaria para servicios de maquillaje profesional, destacando los detalles, acabados y calidad del trabajo realizado."
             data-experiencia="Proyecto universitario de fotografía publicitaria para servicios de maquillaje profesional, destacando los detalles, acabados y calidad del trabajo realizado."
             data-fotos="imagenes/editorial_lu/foto Lu.JPG,imagenes/editorial_lu/fotoLu1.jpg,imagenes/editorial_lu/fotoLu2.jpg">
          <img src="imagenes/editorial_lu/foto Lu.JPG" alt="Maquillaje Profesional">
        </div>

        <!-- ── EDITORIAL · Valentina Ponce ── -->
        <div class="gal-item" data-cat="editorial"
             data-title="Editorial de Belleza"
             data-lugar="Cochabamba, Bolivia"
             data-desc="Editorial de belleza (Modelo: Valentina Ponce de Leon @valen.poccc). Serie fotográfica enfocada en la exploración de la belleza, la expresión y la presencia visual de la modelo mediante una iluminación controlada y una dirección artística de carácter elegante."
             data-experiencia="Serie fotográfica enfocada en la exploración de la belleza, la expresión y la presencia visual de la modelo mediante una iluminación controlada y una dirección artística de carácter elegante."
             data-instagram="https://www.instagram.com/valen.poccc"
             data-fotos="imagenes/editorial_valentina_ponce/editorial_Valentina_Ponce.jpg,imagenes/editorial_valentina_ponce/editorial_Valentina_Ponce1.jpg,imagenes/editorial_valentina_ponce/editorial_Valentina_Ponce2.jpg,imagenes/editorial_valentina_ponce/editorial_Valentina_Ponce3.jpg">
          <img src="imagenes/editorial_valentina_ponce/editorial_Valentina_Ponce.jpg" alt="Editorial Valentina Ponce">
        </div>

        <!-- ── EDITORIAL · Isis Camacho ── -->
        <div class="gal-item" data-cat="editorial"
             data-title="Beauty Editorial"
             data-lugar="Bolivia"
             data-desc="Beauty Editorial (Modelo: Isis Camacho @isis_camacho_). Proyecto editorial desarrollado durante una formación especializada en fotografía. La serie explora la relación entre color, estilismo y retrato mediante una propuesta visual contemporánea."
             data-experiencia="Proyecto editorial desarrollado durante una formación especializada en fotografía. La serie explora la relación entre color, estilismo y retrato mediante una propuesta visual contemporánea."
             data-instagram="https://www.instagram.com/isis_camacho_"
             data-fotos="imagenes/editorial_Isis_camacho/editorial_isis_camacho.jpg,imagenes/editorial_Isis_camacho/editorial_isis_camacho1.jpg,imagenes/editorial_Isis_camacho/editorial_isis_camacho2.jpg,imagenes/editorial_Isis_camacho/editorial_isis_camacho3.jpg,imagenes/editorial_Isis_camacho/editorial_isis_camacho4.jpg">
          <img src="imagenes/editorial_Isis_camacho/editorial_isis_camacho4.jpg" alt="Isis Camacho">
        </div>

        <!-- ── EDITORIAL · Fashion & Lifestyle ── -->
        <div class="gal-item" data-cat="editorial"
             data-title="Fashion &amp; Lifestyle"
             data-lugar="Bolivia"
             data-desc="Proyecto universitario de fotografía fashion y lifestyle enfocado en la exploración del estilismo, la expresión personal y la estética editorial."
             data-experiencia="Proyecto universitario de fotografía fashion y lifestyle enfocado en la exploración del estilismo, la expresión personal y la estética editorial."
             data-fotos="imagenes/editorial_fashion/Ediorial_Fashion.jpg,imagenes/editorial_fashion/Ediorial_Fashion1.jpg,imagenes/editorial_fashion/Ediorial_Fashion2.jpg,imagenes/editorial_fashion/Ediorial_Fashion3.jpg,imagenes/editorial_fashion/Editorial_Fashion1.png">
          <img src="imagenes/editorial_fashion/Ediorial_Fashion.jpg" alt="Fashion & Lifestyle">
        </div>

        <!-- ── PUBLICITARIA · Paola Palacios ── -->
        <div class="gal-item" data-cat="publicitaria"
             data-title="Paola Palacios Accesorios"
             data-lugar="Cochabamba, Bolivia"
             data-desc="Proyecto universitario de fotografía publicitaria desarrollado para Paola Palacios Accesorios. La propuesta visual se enfocó en resaltar la delicadeza, calidad y detalles de cada pieza artesanal."
             data-experiencia="Proyecto universitario de fotografía publicitaria desarrollado para Paola Palacios Accesorios. La propuesta visual se enfocó en resaltar la delicadeza, calidad y detalles de cada pieza artesanal."
             data-fotos="imagenes/publicitaria_final/final.jpg,imagenes/publicitaria_final/final1.png,imagenes/publicitaria_final/final2.png">
          <img src="imagenes/publicitaria_final/final.jpg" alt="Paola Palacios Accesorios">
        </div>

        <!-- ── PUBLICITARIA · GABA ── -->
        <div class="gal-item" data-cat="publicitaria"
             data-title="GABA · Alfajores Artesanales"
             data-lugar="Cochabamba, Bolivia"
             data-desc="Fotografía publicitaria desarrollada para GABA, emprendimiento dedicado a la elaboración de alfajores artesanales. Las imágenes fueron creadas para fortalecer la identidad visual de la marca y destacar la calidad de sus productos."
             data-experiencia="Fotografía publicitaria desarrollada para GABA, emprendimiento dedicado a la elaboración de alfajores artesanales. Las imágenes fueron creadas para fortalecer la identidad visual de la marca y destacar la calidad de sus productos."
             data-fotos="imagenes/publicitaria_choco/choco.jpg,imagenes/publicitaria_choco/choco1.png,imagenes/publicitaria_choco/choco2.png">
          <img src="imagenes/publicitaria_choco/choco.jpg" alt="GABA Alfajores">
        </div>

        <!-- ── DOCUMENTAL ── -->
        <div class="gal-item" data-cat="documental"
             data-title="Momento capturado"
             data-lugar="Bolivia"
             data-desc="Fotografía documental que captura un instante real, sin intervención ni puesta en escena."
             data-experiencia="La fotografía documental exige paciencia y respeto por el momento. Esta imagen nació de observar sin interrumpir, dejando que la escena hablara por sí misma."
             data-fotos="imagenes/documental/docuemntal.JPG">
          <img src="imagenes/documental/docuemntal.JPG" alt="Momento capturado">
        </div>

      </div>
    </div>
  </section>

  <!-- ═══ FOOTER ═══ -->
  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__logo">CAMIRA</span>
      <nav class="footer__links" aria-label="Redes sociales">
        <a href="https://www.instagram.com/camiradesign?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noopener">INSTAGRAM</a>
        <a href="https://www.tiktok.com/@camiradesign">TIKTOK</a>
        <a href="mailto:camira.design@gmail.com">EMAIL</a>
      </nav>
      <span class="footer__copy">© 2026 CAMIRA · TODOS LOS DERECHOS RESERVADOS</span>
    </div>
  </footer>

  <!-- ═══ MODAL DETALLE FOTO ═══ -->

    <div class="foto-modal__content" id="fotoModalContent">
      <button class="foto-modal__close" id="fotoModalClose">✕</button>
      <div class="foto-modal__img-wrap">
        <img class="foto-modal__img" id="fotoModalImg" src="" alt="">
      </div>
      <div class="foto-modal__body">
        <h3 class="foto-modal__title" id="fotoModalTitle"></h3>
        <p class="foto-modal__lugar" id="fotoModalLugar"></p>
        <a class="foto-modal__instagram" id="fotoModalIg" href="" target="_blank" rel="noopener" style="display:none;">@Instagram</a>
        <div class="foto-modal__sep"></div>
        <p class="foto-modal__desc" id="fotoModalDesc"></p>
        <h4 class="foto-modal__exp-label">EXPERIENCIA</h4>
        <p class="foto-modal__exp" id="fotoModalExp"></p>

        <div class="foto-modal__sep"></div>

        <h4 class="foto-modal__exp-label">MÁS FOTOS DEL EVENTO</h4>
        <div class="foto-modal__carousel">
          <button class="foto-modal__car-btn foto-modal__car-btn--prev" id="fotoCarPrev">‹</button>
          <div class="foto-modal__car-viewport">
            <div class="foto-modal__car-track" id="fotoCarTrack"></div>
          </div>
          <button class="foto-modal__car-btn foto-modal__car-btn--next" id="fotoCarNext">›</button>
        </div>

        <div class="foto-modal__sep"></div>

        <div class="foto-modal__cita">
          <a href="https://wa.me/59168923029?text=%C2%A1Hola%20Camira!%20Me%20interesa%20una%20sesi%C3%B3n%20fotogr%C3%A1fica%20%F0%9F%93%B8" target="_blank" rel="noopener" class="foto-modal__cita-btn">

  <!-- ═══ LIGHTBOX FOTO AMPLIADA ═══ -->
  <div class="foto-lightbox" id="fotoLightbox">
    <button class="foto-lightbox__close" id="fotoLightboxClose">✕</button>
    <img class="foto-lightbox__img" id="fotoLightboxImg" src="" alt="">
  </div>

  <script src="galeria.js"></script>
